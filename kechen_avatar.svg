<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#1a1a3e"/>
      <stop offset="100%" stop-color="#080814"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#b89b5b" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#b89b5b" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 背景 — 无圆角，填满 -->
  <rect width="400" height="400" fill="url(#bg)"/>

  <!-- 散布星点 -->
  <circle cx="40" cy="50" r="1.5" fill="#fff" opacity="0.7"/>
  <circle cx="75" cy="30" r="1" fill="#fff" opacity="0.5"/>
  <circle cx="350" cy="45" r="1.3" fill="#fff" opacity="0.65"/>
  <circle cx="300" cy="20" r="0.9" fill="#fff" opacity="0.45"/>
  <circle cx="380" cy="160" r="1.4" fill="#fff" opacity="0.7"/>
  <circle cx="15" cy="200" r="1.1" fill="#fff" opacity="0.55"/>
  <circle cx="55" cy="350" r="1" fill="#fff" opacity="0.5"/>
  <circle cx="345" cy="370" r="1.3" fill="#fff" opacity="0.65"/>
  <circle cx="370" cy="310" r="0.8" fill="#fff" opacity="0.4"/>
  <circle cx="30" cy="120" r="0.9" fill="#fff" opacity="0.5"/>
  <circle cx="155" cy="10" r="1.1" fill="#fff" opacity="0.55"/>
  <circle cx="320" cy="100" r="1" fill="#fff" opacity="0.5"/>
  <circle cx="140" cy="380" r="0.7" fill="#fff" opacity="0.4"/>
  <circle cx="280" cy="385" r="0.9" fill="#fff" opacity="0.5"/>

  <!-- 光晕 -->
  <circle cx="200" cy="185" r="170" fill="url(#glow)"/>

  <!-- 轨道环 -->
  <ellipse cx="200" cy="185" rx="145" ry="42" fill="none" stroke="#b89b5b" stroke-width="0.8" opacity="0.25" transform="rotate(-15,200,185)"/>
  <ellipse cx="200" cy="185" rx="105" ry="30" fill="none" stroke="#b89b5b" stroke-width="0.5" opacity="0.18" transform="rotate(10,200,185)"/>

  <!-- 行星外圈 -->
  <circle cx="200" cy="185" r="72" fill="none" stroke="#b89b5b" stroke-width="1.5" opacity="0.45"/>
  <circle cx="200" cy="185" r="62" fill="#12122a" stroke="#b89b5b" stroke-width="1" opacity="0.75"/>
  <circle cx="200" cy="185" r="54" fill="#1a1a38"/>

  <!-- 行星纹理 -->
  <circle cx="180" cy="172" r="10" fill="#b89b5b" opacity="0.13"/>
  <circle cx="222" cy="195" r="7" fill="#b89b5b" opacity="0.09"/>
  <circle cx="195" cy="208" r="5" fill="#b89b5b" opacity="0.11"/>

  <!-- 环绕星尘 -->
  <circle cx="145" cy="140" r="4" fill="#c9a963" opacity="0.65" filter="url(#softGlow)"/>
  <circle cx="262" cy="225" r="3" fill="#c9a963" opacity="0.45"/>
  <circle cx="168" cy="235" r="2.5" fill="#c9a963" opacity="0.4"/>
  <circle cx="240" cy="138" r="2" fill="#c9a963" opacity="0.35"/>

  <!-- 四角星芒 -->
  <g transform="translate(200,185)" opacity="0.12">
    <line x1="-82" y1="0" x2="82" y2="0" stroke="#d4c08a" stroke-width="0.5"/>
    <line x1="0" y1="-82" x2="0" y2="82" stroke="#d4c08a" stroke-width="0.5"/>
  </g>

  <!-- 客尘 -->
  <text x="200" y="202" text-anchor="middle" font-family="'PingFang SC','Noto Sans SC','Microsoft YaHei',sans-serif" font-size="58" font-weight="700" fill="#d4c08a" filter="url(#softGlow)" letter-spacing="10">客尘</text>

  <!-- 底部小字 -->
  <text x="200" y="336" text-anchor="middle" font-family="'PingFang SC','Noto Sans SC',sans-serif" font-size="13" fill="#b89b5b" opacity="0.45" letter-spacing="5">GUEST DUST</text>
  <line x1="100" y1="350" x2="300" y2="350" stroke="#b89b5b" stroke-width="0.4" opacity="0.25"/>
</svg>