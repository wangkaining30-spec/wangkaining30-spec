<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bare Translate Test</title>
<style>
  body { font-family: sans-serif; padding: 20px; background: #111; color: #eee; }
  button { padding: 15px 30px; font-size: 18px; }
  a { color: #88f; margin: 0 10px; }
  .box { margin: 15px 0; padding: 10px; background: #222; border-radius: 8px; }
</style>
</head>
<body>
<h2>🔬 最简翻译测试</h2>

<nav>
  <a href="#" data-zh>客尘</a>
  <a href="#" data-zh>关于</a>
  <a href="#" data-zh>兴趣</a>
</nav>

<button onclick="doTranslate()" id="btn">🌐 点我翻译</button>

<div class="box" id="log">等待点击...</div>

<script>
  var en = false;
  var map = { '客尘': 'guest dust', '关于': 'about', '兴趣': 'interest' };
  
  window.doTranslate = function() {
    en = !en;
    document.getElementById('log').textContent = 'en=' + en;
    
    var els = document.querySelectorAll('[data-zh]');
    for (var i = 0; i < els.length; i++) {
      var e = els[i];
      var zh = e.getAttribute('data-zh');
      if (!zh || !zh.trim()) {
        zh = e.textContent.trim();
        if (!zh) continue;
        e.setAttribute('data-zh', zh);
      }
      e.textContent = en ? (map[zh] || zh) : zh;
    }
    
    document.getElementById('btn').textContent = en ? '↩ 恢复' : '🌐 点我翻译';
  };
</script>
</body>
</html>
